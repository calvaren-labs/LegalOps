<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Council Capability Verification</title>
<style>
body {
  font-family: system-ui;
  background: #111;
  color: #eee;
  padding: 40px;
  max-width: 900px;
  margin: auto;
}
h2 {
  margin-top: 40px;
  border-bottom: 1px solid #333;
  padding-bottom: 6px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 25px;
}
th, td {
  padding: 8px 6px;
}
th {
  text-align: left;
  color: #aaa;
  font-weight: 500;
}
input[type="checkbox"] {
  transform: scale(1.2);
}
button {
  padding: 10px 18px;
  background: #2e7df6;
  border: none;
  color: white;
  font-weight: 600;
  cursor: pointer;
  border-radius: 6px;
}
button:hover {
  opacity: 0.9;
}
select {
  padding: 6px;
  margin-bottom: 20px;
}
.notice {
  margin-top: 15px;
  color: #6cf;
}
</style>
</head>
<body>

<h1>Council Capability Profile Verification</h1>

<label>Select your name:</label><br>
<select id="memberSelect">
<option value="">-- Select Member --</option>
</select>

<div id="capabilities"></div>

<button onclick="saveData()">Save</button>
<div class="notice" id="status"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyueJX8tesc0YNm40MPzrP9gEqZLCoUDxDOnlId0a3GVZQmE38jnmR7PPPQPNLvqcM/exec";

const members = [
"Karissa Boley",
"Angelina Colombo",
"Brett Durand",
"Charandeep Kaur",
"Dan Coll",
"Derek Mogck",
"Drew Ward",
"Emily Teuben",
"Eric Paul",
"Jessica Vander Ploeg",
"Mary Burrelle Gardner",
"Maureen Glennon",
"Rozenn Heath",
"Walt Cain",
"Aisleigh Mc Gann",
"Amanda Sharpe",
"LaTonya Ellis"
];

const structure = {
"Tech & AI": [
"AI Strategy",
"Technology Implementation",
"Legal Tech Architecture",
"Buy vs Build",
"Systems Rollout"
],
"Financial": [
"Budgeting",
"Forecasting",
"Spend Analytics",
"Cost Optimization"
],
"Litigation": [
"Litigation Ops",
"Mass Tort Ops"
],
"Org & Change": [
"Org Design",
"Operating Model",
"Transformation"
],
"Outside Counsel": [
"Outside Counsel Management",
"Vendor Strategy"
],
"Executive Leadership": [
"Executive Navigation",
"Board Communication"
]
};

function buildMembers() {
const select = document.getElementById("memberSelect");
members.forEach(name => {
let option = document.createElement("option");
option.value = name;
option.textContent = name;
select.appendChild(option);
});
}

function buildCapabilities() {
const container = document.getElementById("capabilities");
container.innerHTML = "";

for (let domain in structure) {
let h2 = document.createElement("h2");
h2.textContent = domain;
container.appendChild(h2);

let table = document.createElement("table");
table.innerHTML = `
<tr>
<th>Capability</th>
<th>Can Help</th>
<th>Needs Help</th>
</tr>
`;

structure[domain].forEach(cap => {
let row = document.createElement("tr");
row.innerHTML = `
<td>${cap}</td>
<td><input type="checkbox" data-key="${cap} - Can"></td>
<td><input type="checkbox" data-key="${cap} - Need"></td>
`;
table.appendChild(row);
});

container.appendChild(table);
}
}

async function saveData() {
const member = document.getElementById("memberSelect").value;
if (!member) {
alert("Please select your name.");
return;
}

let payload = { Member: member };

document.querySelectorAll("input[type='checkbox']").forEach(box => {
payload[box.dataset.key] = box.checked ? 1 : 0;
});

try {
await fetch(API_URL, {
method: "POST",
body: JSON.stringify(payload)
});
document.getElementById("status").textContent = "Saved successfully.";
} catch (err) {
document.getElementById("status").textContent = "Error saving.";
}
}

buildMembers();
buildCapabilities();

</script>

</body>
</html>
